#   #1 lhp_element_has_class    lib/misc/lhp.c:824:11  <- faulting library frame
#   #2 lws_css_cascade_atr_match lib/misc/lhp.c:887
#   #3 lws_css_cascade           lib/misc/lhp.c:1159
#   #4 lws_lhp_parse             lib/misc/lhp.c:1524
# READ of size 2, 0 bytes after a 47-byte region.
