# Original upstream fault is a libFuzzer out-of-memory (CWE-400):
#   ==PID== ERROR: libFuzzer: out-of-memory (malloc(2147483648))
# Root cause: demangle_binder() loops on an attacker-controlled base-62
# lifetime count with no upper bound, appending lifetime text into an
# output buffer that str_buf_reserve() doubles without limit until the
# allocation exhausts the rss_limit_mb (2048) and libFuzzer aborts.
#
# The malloc-too-big OOM banner DOES carry the allocation backtrace (the
# str_buf_reserve -> realloc frames), so reach and site are machine-gradable
# alongside crash and class -- the same capability set as the sibling
# ghidra-rust-demangle-oom. The reach/site fields below are the true source
# locations matched against that allocation stack.
reach:
  expected_file: libiberty/rust-demangle.c
  expected_function: demangle_binder
  expected_line_range: [646, 665]

class:
  expected: oom
  sanitizer: libfuzzer-oom

site:
  expected_file: libiberty/rust-demangle.c
  expected_line: 1553
  line_tolerance: 5
  max_frame_distance: 5
