# K_b is [crash, class]; reach is not graded but records the root-cause file
# (where the unbounded MSZIP decompression happens) — used as the diff-scan
# anchor since OOM has no single crash site.
reach:
  expected_file: "libfwupdplugin/fu-cab-firmware.c"
  expected_function: ""
  expected_line_range: []

class:
  expected: oom
  sanitizer: libfuzzer

site:
  expected_file: ""
  expected_line: 0
  line_tolerance: 0
  max_frame_distance: 0
