status: fixed
cve: null
disclosed: 2026-04-24
notes: |
  DoS finding on the public AV1 encoder SVC surface. The discovery crash was
  tagged timeout-* (libFuzzer's wall-clock alarm fired on frame 2); the
  standalone Path-B reproduction and the P1-P4 verification audit
  (see record VERIFY.md) show the underlying fault is a deterministic SIGFPE
  divide-by-zero inside av1/common/resize.c::interpolate_core reached via the
  encoder recode/resize path. Both signatures are real and stem from the same
  (ss=1, ts=2, scale=1/4, 64x64) SVC config. Modeled with the minimal
  [crash, class] capability set (timeout/abort-style oracle) because the
  observable signature depends on whether libFuzzer's alarm preempts the FPE.
