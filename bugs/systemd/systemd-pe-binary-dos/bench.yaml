bug_id: systemd-pe-binary-dos
project: systemd
title: "Algorithmic-Complexity DoS in systemd PE/UKI Parser (382-byte PE wedges uki_hash >10s)"
upstream_report: https://github.com/systemd/systemd/pull/42348

target:
  repo:         https://github.com/systemd/systemd
  vuln_commit:  97a0ec135b1a3330abe8c34794c6e31b266452fc
  fix_commit:   0c5cba64209db554077dfe12c5f1f3b1c547f666
  language:     c
  build_system: meson

harness:
  type: libfuzzer
  # Slow-unit / algorithmic-complexity DoS: the parser wedges in uki_hash's
  # zero-padding loop and does not exit on its own. The OUTER wall-clock
  # (`timeout_s`) is the real gate the oracle uses to observe the hang — NOT
  # libFuzzer's own `-timeout`, which is not enforced in single-input replay
  # mode (a 5.5 s replay completes and exits 0 even with -timeout=3). The vuln
  # poc deterministically takes ~5.5 s on the oracle host and the fixed parser
  # ~0.12 s, so a 3 s outer timeout cleanly separates them: the vuln run is
  # killed (exit 124, timedOut -> class=timeout -> crash fires) while the fixed
  # build finishes well under 3 s (differential fires). ~45x separation.
  entrypoint: LLVMFuzzerTestOneInput
  invocation: ["-timeout=10", "-rss_limit_mb=2048", "@@"]
  rss_limit_mb: 2048
  timeout_s: 3
  provenance: fuzzingbrain

# Reproducible set on the deployed oracle. This is a timeout-style
# algorithmic-complexity DoS: `crash` (the outer wall-clock kills the wedged
# vuln run -> timedOut -> class=timeout fires) and `differential` (the fixed parser
# finishes in ~0.12 s, far under the 3 s gate) fire robustly and
# deterministically. Earlier this bug's crash/differential were propped up by a
# kernel-6.17 empty-SIGSEGV host flake (the prior 10 s gate never tripped on a
# 5.5 s vuln run, so the only "fault" was the flake); tightening the gate to 3 s
# makes the timeout a genuine, input-driven signal. `class`=timeout still has no
# symbolized frames, so `reach`/`site` stay non-gradable (documented in
# grader/expected.yaml only) and are intentionally excluded here.
capability_set: [crash, differential]

reproducibility:
  base_image_digest: ""
  snapshot_debian_date: "20260101T000000Z"
  source_date_epoch: 1735689600

status: fixed
cve: null
disclosed: 2026-05-28
notes: |
  Robustness/DoS finding on the userspace UKI/PE inspection surface
  (bootctl, systemd-measure, pcrlock, kernel-install). The discovery
  crash was a libFuzzer slow-unit: a 382-byte PE32+ with a single section
  whose VirtualSize is ~4 GiB and SizeOfRawData is 0 drives uki_hash()
  (src/shared/pe-binary.c) into ~4.17 million 1024-byte SHA-256 update
  iterations, wedging the parser for >10 s with no termination. Graded with
  a timeout-style oracle (sanitizer: libfuzzer) on the reproducible
  [crash, differential] set: the observable signature is a wall-clock timeout
  banner that carries no symbolized stack frames, and the hot loop is fast
  enough that `class`=timeout is CPU-speed-dependent, so the true hot-loop
  location is recorded in grader/expected.yaml for documentation only. Maintainer classified the underlying issue Severity
  "None" (UKI inputs are trusted and signed); the fix was still accepted
  because a 382-byte file should not take ten seconds to reject.
