bug_id: libvpx-vpx-img-flip-ub
project: libvpx
title: "Undefined Behavior in libvpx vpx_img_flip: pointer arithmetic on NULL alpha plane"
upstream_report: https://issues.webmproject.org/issues/512911654

target:
  repo:         https://chromium.googlesource.com/webm/libvpx
  vuln_commit:  3c456eb6eea2fcea46115d61eb72014d4f882541
  language:     cpp
  build_system: configure

harness:
  type: libfuzzer
  entrypoint: LLVMFuzzerTestOneInput
  invocation: ["@@"]
  rss_limit_mb: 2048
  timeout_s: 30
  provenance: fuzzingbrain   # vpx_image_format_matrix_fuzzer.cc (public vpx_image API)

capability_set: [class, crash, reach, site]   # UBSan: grader detects crash+reach; class/site not machine-detected for ubsan

reproducibility:
  base_image_digest: ""
  snapshot_debian_date: "20260101T000000Z"
  source_date_epoch: 1735689600

status: fixed
cve: null
disclosed: 2026-05-14
notes: |
  UBSan-detected undefined behavior (null-pointer-arithmetic). The asan
  library build and asan harness configs add -fsanitize=undefined because ASan
  alone does not flag NULL + offset. The bug fires when vpx_img_flip is called
  (via the harness do_flip path) on a non-alpha image format whose
  planes[VPX_PLANE_ALPHA] is NULL but stride[VPX_PLANE_ALPHA] is non-zero.
  Fixed upstream in commit ca2f535c9ce6fce777864d4ce5b5774516b08978.
