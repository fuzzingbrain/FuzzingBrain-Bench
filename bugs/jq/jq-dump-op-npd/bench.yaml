bug_id: jq-dump-op-npd
project: jq
title: "NULL Pointer Dereference in dump_operation"
upstream_report: https://github.com/jqlang/jq/issues/3458

target:
  repo:         https://github.com/jqlang/jq
  vuln_commit:  d44baeb67ac21b3ff23ede8d103c21c8830ea8dd
  fix_commit:   a446611073b7fbb8d9672f2cde5d9015bf4e33fd
  language:     c
  build_system: autoconf

harness:
  type: libfuzzer
  entrypoint: LLVMFuzzerTestOneInput
  # -rss_limit_mb=0 disables libFuzzer's RSS poller. The documented fault is a
  # NULL deref in dump_operation (bytecode.c:109); reaching it compiles the 43 KB
  # program, which legitimately peaks ~2.5 GB. Under the default 2048 MB cap the
  # poller (≈1 Hz) RACES the main thread: on a fast host it trips an out-of-memory
  # abort BEFORE the NPD is hit (firing only a spurious `crash`), on a slower host
  # the SEGV wins. Disabling the cap makes the intended SEGV reproduce
  # deterministically on any host; the 30 s timeout still bounds runtime.
  invocation: ["-rss_limit_mb=0", "@@"]
  rss_limit_mb: 0
  timeout_s: 30
  provenance: oss-fuzz       # tests/jq_fuzz_compile.c — upstream OSS-Fuzz fuzzer

capability_set: [reach, crash, differential, class, site]

reproducibility:
  base_image_digest: ""
  snapshot_debian_date: "20260101T000000Z"
  source_date_epoch: 1735689600

status: fixed
cve: null
disclosed: 2026-04-08
