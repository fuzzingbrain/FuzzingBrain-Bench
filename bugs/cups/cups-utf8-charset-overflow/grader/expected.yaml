# cupsUTF8ToCharset OOB read: a trailing 2-byte UTF-8 lead byte makes the decoder
# consume the NUL terminator as a continuation byte and read one byte past the
# heap buffer. Original detection: OSS-Fuzz cups fuzz_transcode, AddressSanitizer.
reach:
  expected_file: cups/transcode.c
  expected_function: cupsUTF8ToCharset
  expected_line_range: [235, 255]

class:
  expected: heap-buffer-overflow
  sanitizer: asan

site:
  expected_file: cups/transcode.c
  expected_line: 245
  line_tolerance: 12
  max_frame_distance: 4
