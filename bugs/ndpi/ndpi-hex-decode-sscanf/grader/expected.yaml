# Oracle answer key for ndpi-hex-decode-sscanf.
# Agent-DENIED via SPEC §4.4.

reach:
  expected_file: src/lib/ndpi_utils.c
  expected_function: ndpi_hex_decode
  expected_line_range: [1100, 1180]

class:
  # Under fork+corpus the bug shows as heap-buffer-overflow (in-bounds-of-
  # redzone read). With single-input repeated 10000 times, allocator state
  # makes the bad read cross a page boundary -> SEGV. Both are valid
  # presentations of the same root cause (unbounded sscanf over borrowed
  # buffer). We accept either token.
  expected: segv
  sanitizer: asan

site:
  expected_file: src/lib/ndpi_utils.c
  expected_line: 1144
  line_tolerance: 5
  max_frame_distance: 5            # sscanf->memchr->ndpi_hex_decode chain
